<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PDF Chef repository hero</title>
  <desc id="desc">Open-source privacy-first PDF tools that process files locally in the browser with no server uploads.</desc>
