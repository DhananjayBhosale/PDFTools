    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "PDF Chef",
        "url": "https://pdfchef.dhananjaytech.app",
        "description": "Private PDF tools for your device. Merge, split, convert, and protect in the browser.",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
    <script>
      (function () {
        var oldHost = "pdftools.dhananjaytech.app";
        var newHost = "pdfchef.dhananjaytech.app";
        if (window.location.hostname !== oldHost) return;

        var target =
          window.location.protocol +
          "//" +
          newHost +
          window.location.pathname +
          window.location.search +
          window.location.hash;

        var controller = new AbortController();
        var timeout = window.setTimeout(function () {
          controller.abort();
        }, 1500);

        fetch("https://" + newHost + "/cdn-cgi/trace", {
          method: "GET",
          mode: "no-cors",
          cache: "no-store",
          signal: controller.signal,
        })
          .then(function () {
            window.location.replace(target);
          })
          .catch(function () {})
          .finally(function () {
            window.clearTimeout(timeout);
          });
      })();
    </script>
